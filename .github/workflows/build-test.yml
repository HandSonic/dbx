name: Build Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compute Rust dependency hash
        id: deps-hash
        shell: bash
        run: |
          {
            find . -name Cargo.toml -not -path './target/*' -print0 \
              | sort -z \
              | xargs -0 sed -E '/^version = /d'
            grep -v '^version = ' Cargo.lock
          } | sha256sum | cut -d' ' -f1 | {
            read -r hash
            echo "hash=${hash:0:20}" >> "$GITHUB_OUTPUT"
          }

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"
          shared-key: release-${{ matrix.target }}-${{ steps.deps-hash.outputs.hash }}
          add-rust-environment-hash-key: false
          cache-on-failure: true

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev xdg-utils

      - name: Install OpenSSL (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          choco install openssl -y
          echo "OPENSSL_DIR=C:/Program Files/OpenSSL-Win64" >> "$GITHUB_ENV"
          echo "OPENSSL_NO_VENDOR=1" >> "$GITHUB_ENV"

      - name: Build Tauri app
        shell: bash
        run: |
          # Generate dummy signing key (Tauri requires it when pubkey is in config)
          KEY_FILE="$RUNNER_TEMP/tauri-signing-key"
          pnpm tauri signer generate -w "$KEY_FILE" -p "" --force 2>&1 || true
          if [ -f "${KEY_FILE}.key" ]; then
            export TAURI_SIGNING_PRIVATE_KEY="$(cat "${KEY_FILE}.key")"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
            echo "Signing key generated successfully"
          elif [ -f "$KEY_FILE" ]; then
            export TAURI_SIGNING_PRIVATE_KEY="$(cat "$KEY_FILE")"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
            echo "Signing key generated successfully (no .key extension)"
          else
            echo "WARNING: Could not generate signing key"
            ls -la "$RUNNER_TEMP/"*key* || true
          fi
          pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbx-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
          retention-days: 7
