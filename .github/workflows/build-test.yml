name: Build Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compute Rust dependency hash
        id: deps-hash
        shell: bash
        run: |
          {
            find . -name Cargo.toml -not -path './target/*' -print0 \
              | sort -z \
              | xargs -0 sed -E '/^version = /d'
            grep -v '^version = ' Cargo.lock
          } | sha256sum | cut -d' ' -f1 | {
            read -r hash
            echo "hash=${hash:0:20}" >> "$GITHUB_OUTPUT"
          }

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"
          shared-key: release-${{ matrix.target }}-${{ steps.deps-hash.outputs.hash }}
          add-rust-environment-hash-key: false
          cache-on-failure: true

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev xdg-utils

      - name: Disable updater in tauri config
        shell: bash
        run: |
          # Remove updater plugin entirely to avoid signing requirement
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              cfg = json.load(f)
          if 'plugins' in cfg and 'updater' in cfg['plugins']:
              del cfg['plugins']['updater']
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "build-test"
          releaseName: "DBX Build Test"
          releaseBody: "Test build with KingBase trigger fix"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbx-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
          retention-days: 7
